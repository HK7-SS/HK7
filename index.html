<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Para você ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      position: relative;
      text-align: center;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      z-index: 2;
    }

    img {
      max-width: 250px;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    h1 {
      color: white;
      margin: 10px 0;
      font-size: 24px;
    }

    p {
      color: white;
      font-size: 16px;
    }

    .heart {
      position: absolute;
      color: rgba(255, 0, 100, 0.6);
      font-size: 18px;
      animation: float 8s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(1);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="snoopy.jpg" alt="Snoopy com coração">

    <h1>Para você ❤️</h1>
    <p>
      Você é a melhor parte dos meus dias.<br>
      Cada momento ao seu lado vale mais do que tudo 💖
    </p>
  </div>

  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 15 + 10) + "px";
      heart.style.animationDuration = (Math.random() * 5 + 5) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    setInterval(createHeart, 500);
  </script>

</body>
</html>
